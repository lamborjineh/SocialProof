[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "tesseract", "poppler_utils"]

[phases.install]
cmds = [
  "pip install --break-system-packages -r requirements.txt",
  "pip install --break-system-packages https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl"
]

[start]
cmd = "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
